<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Mini Social</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <h1 class="logo">Mini Social</h1>
</header>

<main class="feed">
  <article class="post">
    <div class="post-header">
      <img src="" class="avatar-small">
      <div>
        <span class="name">Alice ribeiro</span>
        <span class="username">@licecarecaxz</span>
      </div>
    </div>

    <p class="post-text">
    Passei na faculdade de Zootecnia bbs
    </p>

    <div class="post-actions">
      <button id="likeBtn">Curtir</button>
      <span id="likeCount">0</span>
    </div>

    <section class="comments">
      <div class="comment">
        <img src="assets/avatar.png" class="avatar-small">
        <p>Parabénss amigaaa!!!!</p>
      </div>

      <div class="comment">
        <img src="assets/avatar.png" class="avatar-small">
        <p> Sabia que vc iria conseguir amoor </p>
      </div>
    </section>

  </article>

</main>

<script src="js/script.js"></script>
</body>
</html>
